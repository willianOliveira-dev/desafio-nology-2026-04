services:
    db:
        image: postgres:16-alpine
        container_name: nology_db
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
            POSTGRES_DB: ${POSTGRES_DB:-nology_db}
        ports:
            - '${DB_PORT:-5432}:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
            interval: 5s
            timeout: 3s
            retries: 5
        networks:
            - app_network

    api:
        build:
            context: .
            dockerfile: api/Dockerfile
        container_name: nology_api
        ports:
            - '${API_PORT:-8000}:8000'
        environment:
            DATABASE_URL: ${DATABASE_URL}
            PYTHON_ENV: ${PYTHON_ENV:-development}
            DEBUG: ${DEBUG:-true}
            PYTHONPATH: /app/src
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - ./api/src:/app/src
            - /app/src/web/dist
        networks:
            - app_network

volumes:
    postgres_data:

networks:
    app_network:
        driver: bridge
